<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect x="3" y="3" width="26" height="26" fill="#c0c0c0" stroke="#000000" stroke-width="1.5"/>
  <!-- Inner border inset -->
  <rect x="5" y="5" width="22" height="22" fill="none" stroke="#ffffff" stroke-width="1"/>
  <!-- Screws in corners -->
  <circle cx="6" cy="6" r="1" fill="#808080"/>
  <circle cx="26" cy="6" r="1" fill="#808080"/>
  <circle cx="6" cy="26" r="1" fill="#808080"/>
  <circle cx="26" cy="26" r="1" fill="#808080"/>
  <!-- Screws dark center -->
  <circle cx="6" cy="6" r="0.5" fill="#000000"/>
  <circle cx="26" cy="6" r="0.5" fill="#000000"/>
  <circle cx="6" cy="26" r="0.5" fill="#000000"/>
  <circle cx="26" cy="26" r="0.5" fill="#000000"/>
  <!-- Sliders -->
  <!-- Slider track 1 -->
  <rect x="9" y="10" width="14" height="2" fill="#808080" stroke="#ffffff" stroke-width="0.5"/>
  <rect x="13" y="7" width="5" height="8" fill="#b0b0b0" stroke="#000000" stroke-width="1"/>
  <line x1="15.5" y1="8" x2="15.5" y2="14" stroke="#ffffff" stroke-width="1"/>
  <!-- Slider track 2 -->
  <rect x="9" y="20" width="14" height="2" fill="#808080" stroke="#ffffff" stroke-width="0.5"/>
  <rect x="18" y="17" width="5" height="8" fill="#b0b0b0" stroke="#000000" stroke-width="1"/>
  <line x1="20.5" y1="18" x2="20.5" y2="24" stroke="#ffffff" stroke-width="1"/>
</svg>
